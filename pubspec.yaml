name: friend_tracker
description: "Share your location with friends in real time. Garmin-inspired UI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Maps
  google_maps_flutter: ^2.10.0

  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Background tasks
  workmanager: ^0.5.2
  flutter_local_notifications: ^18.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
